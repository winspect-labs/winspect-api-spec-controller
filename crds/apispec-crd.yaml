apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apispecs.winspect.io
  annotations:
    description: "Winspect ApiSpec - GitOps-friendly API spec declaration for Kubernetes"
spec:
  group: winspect.io
  names:
    kind: ApiSpec
    listKind: ApiSpecList
    plural: apispecs
    singular: apispec
    shortNames:
      - as
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - metadata
            - spec
          properties:
            spec:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                  description: Service or repo name
                owner:
                  type: string
                  description: Team name or team ID from Winspect
                type:
                  type: string
                  description: Spec type (openapi-3.0, openapi-3.1)
                  enum:
                    - openapi-3.0
                    - openapi-3.1
                gitSha:
                  type: string
                  description: Git commit SHA of the spec file (resolved by CD)
                githubRepo:
                  type: string
                  description: GitHub repository URL for diff link
                githubBranch:
                  type: string
                  description: GitHub branch name
                specFilePath:
                  type: string
                  description: Path to spec file in repository
                definition:
                  type: object
                  description: OpenAPI content - use inline (small specs) or configMapRef (large specs)
                  properties:
                    inline:
                      type: string
                    configMapRef:
                      type: object
                      required:
                        - name
                        - key
                      properties:
                        name:
                          type: string
                        key:
                          type: string
